name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: false

    - name: Get dependencies
      run: go mod download

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        BINARY_NAME=clio-${{ matrix.goos }}-${{ matrix.goarch }}
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME+='.exe'
        fi
        go build -ldflags="-s -w" -o dist/$BINARY_NAME ./cmd/clio

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-install-script:
    name: Upload Install Script to CLIPilot
    runs-on: ubuntu-latest
    needs: releases-matrix
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Check if install.sh exists
        run: |
          if [ ! -f "install.sh" ]; then
            echo "ERROR: install.sh not found!"
            exit 1
          fi
          echo "✓ install.sh found"
          ls -lh install.sh
      
      - name: Upload install script to CLIPilot server
        env:
          API_KEY: ${{ secrets.CLIPILOT_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "⚠️  CLIPILOT_API_KEY secret is not configured"
            echo "Skipping upload. Add the secret in: Settings → Secrets and variables → Actions"
            exit 0
          fi
          
          echo "✓ API key is configured"
          echo "Uploading install.sh to CLIPilot server..."
          echo "Version: ${{ github.ref_name }}"
          
          RESPONSE=$(curl -w "\nHTTP_CODE:%{http_code}" -X POST \
            https://clipilot.themobileprof.com/api/install-script/upload \
            -H "Authorization: Bearer $API_KEY" \
            -F "file=@install.sh" \
            -F "version=${{ github.ref_name }}")
          
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
          
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Successfully uploaded install script"
          else
            echo "❌ Upload failed with status $HTTP_CODE"
            echo "Response body: $BODY"
            exit 1
          fi
        continue-on-error: true